name: creacionesbaby
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  supabase_flutter: ^2.12.0
  uuid: ^4.5.2
  google_fonts: ^8.0.2
  url_launcher: ^6.3.2
  flutter_stripe: ^12.3.0
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.2
  firebase_crashlytics: ^5.0.7
  firebase_app_check: ^0.4.1+4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:

  uses-material-design: true

  assets:
    - assets/images/
