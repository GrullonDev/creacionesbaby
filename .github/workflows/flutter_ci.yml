name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.1'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Verify formatting
        run: dart format .
        
      - name: Analyze project source
        run: flutter analyze --no-fatal-infos
        
      - name: Run tests
        run: flutter test
        
      - name: Build Web
        run: flutter build web --release

      - name: Deploy Web to Hostinger (FTP)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: build/web/
          server-dir: public_html/

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk --app ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # iOS build requires a macOS runner and certificates/provisioning profiles.
      # This step is prepared but will likely need manual setup for signing.
      # - name: Build iOS IPA
      #   run: flutter build ipa --release --no-codesign
